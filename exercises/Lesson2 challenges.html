<!DOCTYPE html>
<html>
  <head>
    <title>Lesson 2 Challenges</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      
    
    function ProductDetails({name, price, discountPrice, imageSrc}){
      const displayPrice = discountPrice? <p><del>Price: ${price}</del></p>:<p>Price: ${price}</p>;
      return(
        <>
        <p>{name}</p>  
        <div>
            <img src={imageSrc} alt={name} width = "150" />
          </div>
          
          
          <p>{displayPrice}</p>
          {
            discountPrice && (
            <>
              <p>Discount Price: ${discountPrice}</p>
            </>
          )}
          <button>Add to Cart</button>
        </>
      );
    }  

    function App(){
      return(
        <>
          <p>Hello, welcome to my website! Buy my stuff yeaahh!!!</p>
          <ProductDetails name="Cotton socks" price="10.90" discountPrice = "5.45" imageSrc="images/cotton-socks.png" />
          <ProductDetails name="Tennis balls" price="6.00" imageSrc="images/tennis-balls.png" />
          <ProductDetails name="Plain T-Shirt" price="7.99" imageSrc="images/plain-t-shirt.png" />
        </>
      );
    }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
